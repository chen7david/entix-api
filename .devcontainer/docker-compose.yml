services:
  devcontainer:
    container_name: entix-api-devcontainer
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspaces/entix-api:cached
      - node_modules:/workspaces/entix-api/node_modules
    network_mode: service:db
    command: sleep infinity
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:13
    container_name: entix-api-db-devcontainer
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: "entix-api-postgres"
  node_modules:
    name: "entix-api-node_modules"
    driver: local
