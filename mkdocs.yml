site_name: Entix API Documentation
site_description: Documentation for the Entix API
repo_url: https://github.com/chen7david/entix-api
repo_name: chen7david/entix-api

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Setup:
      - Overview: setup/README.md
      - Development Environment: setup/development.md
      - Database Configuration: setup/database.md
      - Environment Variables: setup/environment.md
  - Usage:
      - Overview: usage/README.md
      - Dependency Injection: usage/dependency-injection.md
      - Controllers: usage/controllers.md
      - Middleware: usage/middleware.md
  - API:
      - Overview: api/README.md
      - Authentication: api/authentication.md
      - Error Handling: api/error-handling.md
      - Response Format: api/response-format.md
  - Contributing:
      - Overview: contributing/README.md
      - Development Workflow: contributing/workflow.md
      - Code Style: contributing/code-style.md
      - Testing: contributing/testing.md
  - FAQ:
      - Common Issues: faq/common-issues.md
      - Troubleshooting: faq/troubleshooting.md
